<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" role="img" aria-label="CAPI - capi-gear.com">
  <rect x="0" y="0" width="320" height="130" rx="2" fill="#000"/>

  <text x="18" y="78" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="64" letter-spacing="-1" fill="#FFFFFF">CAPI</text>
  <text x="14" y="118" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="18" fill="#007DC5">capi-gear.com</text>
  <text x="306" y="122" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="14" fill="#FFFFFF">®</text>

  <defs>
    <linearGradient id="capi-plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6E6E6"/>
      <stop offset="50%" stop-color="#B8B8B8"/>
      <stop offset="100%" stop-color="#5E5E5E"/>
