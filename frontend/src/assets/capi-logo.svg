      <stop offset="60%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>
  </defs>

  <g class="capi-spinner" transform="rotate(0 230 55)">
    <path d="M 208,5 L 282,3 L 283,4 L 280,77 Q 259,84 252,105 L 208,105 Q 201,84 180,77 L 180,33 Q 201,26 208,5 Z" fill="url(#capi-plate)" stroke="#1a1a1a" stroke-width="1.4"/>
    <path d="M 211,8 L 278,6 L 279,7 L 277,75 Q 257,82 250,102 L 210,102 Q 203,82 183,75 L 183,35 Q 204,28 211,8 Z" fill="none" stroke="#7a7a7a" stroke-width="0.6" opacity="0.7"/>

    <g>
